<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R34 GT-R // MEXT STUDY COCKPIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --mfd-bg: #030508;
            --mfd-text: #ff1a1a;
            --mfd-glow: rgba(255, 26, 26, 0.5);
            --dash-plastic: #0f0f0f;
            --btn-base: #1a1a1a;
            --telemetry-cyan: #A80000;
            --jdm-red: #A80000;
            --silver-text: #d4d4d4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body, html {
            height: 100vh; width: 100vw;
            background-color: #000;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            perspective: 1000px; 
        }

        /* --- WINDSHIELD SCENE --- */
        .windshield {
            position: absolute; top: -5%; left: -5%;
            width: 110%; height: 110%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), 
                        url('bg.png'); 
            background-size: cover; background-position: center;
            z-index: 1; transition: transform 0.1s ease-out;
        }

        /* --- DASHBOARD RIG --- */
        .dash-rig {
            position: absolute; bottom: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 10;
            display: flex; justify-content: center; align-items: flex-end;
            transform-style: preserve-3d; transform-origin: bottom center;
            pointer-events: none; 
        }

        .dashboard-base {
            position: absolute; bottom: -15vh;
            width: 130%; height: 50vh; background: var(--dash-plastic);
            background-image: repeating-linear-gradient(45deg, #0a0a0a 0, #0a0a0a 2px, #111 2px, #111 4px);
            border-top: 8px solid #050505;
            transform: rotateX(30deg) translateZ(-50px);
            box-shadow: 0 -40px 100px rgba(0,0,0,1);
            z-index: 5; border-radius: 50% 50% 0 0 / 15% 15% 0 0;
        }

        .cockpit-wrap {
            position: relative; width: 95vw; height: 500px;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 20; transform-style: preserve-3d; padding-bottom: 50px; 
        }

        /* --- COLD DARK STATE --- */
        .power-element {
            opacity: 0.05;
            filter: grayscale(1);
            transition: opacity 1.5s ease, filter 1.5s ease;
        }
        .power-on .power-element {
            opacity: 1;
            filter: grayscale(0);
        }

        /* --- LEFT: TELEMETRY PANEL (NEW MEXT LOOK) --- */
        .telemetry-panel {
            width: 300px; height: 350px;
            background: rgba(5, 5, 5, 0.9); border: 1px solid #222;
            border-left: 3px solid var(--telemetry-cyan); border-radius: 4px; padding: 18px;
            transform: rotateY(20deg) translateY(-20px) translateZ(80px); 
            box-shadow: inset 0 0 30px #000;
            display: flex; flex-direction: column; pointer-events: auto;
        }

        .tel-header {
            color: var(--mfd-text); font-family: 'Orbitron', sans-serif; font-size: 0.85rem;
            border-bottom: 1px solid var(--mfd-text); padding-bottom: 6px; margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .objective-box {
            background: rgba(15,15,15,0.8); border: 1px solid #222; padding: 12px; margin-bottom: 20px;
        }
        .obj-title { color: #555; font-size: 0.55rem; letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase;}
        .obj-target { color: var(--mfd-text); font-size: 0.8rem; font-weight: bold; }

        .track-map {
            margin-top: auto; height: 120px; position: relative;
            border: 1px dashed #222; background: rgba(0,0,0,0.3);
        }
        .map-title { position: absolute; top: 6px; left: 8px; color: #555; font-size: 0.55rem; letter-spacing: 2px; }

        .route-line { position: absolute; top: 65%; left: 10%; width: 80%; height: 1px; background: #333; }
        
        #course-position {
            position: absolute; top: 65%; left: 10%; width: 12px; height: 8px;
            background: var(--mfd-text); box-shadow: 0 0 10px var(--mfd-text);
            transform: translate(-50%, -50%); transition: left 1s linear; z-index: 10;
        }

        .checkpoint {
            position: absolute; top: 65%; width: 6px; height: 6px; background: #333;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 2;
        }
        .checkpoint.cleared { background: #fff; box-shadow: 0 0 8px #fff; }

        .cp-label {
            position: absolute; color: #555; font-size: 0.45rem; text-align: center;
            transform: translateX(-50%); width: 50px; font-weight: bold; line-height: 1.2;
        }
        .cp-label.top { top: 22%; }
        .cp-label.bottom { top: 78%; }
        .cp-label.active { color: #fff; text-shadow: 0 0 5px #fff; }

        /* --- CENTER: MFD --- */
        .center-console {
            width: 400px; height: 380px; background: #121212; border: 2px solid #222; border-radius: 10px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.9), inset 0 0 15px #000;
            transform: translateZ(120px); display: flex; flex-direction: column; align-items: center; padding: 15px; pointer-events: auto;
        }
        
        #disp-month {
            color: var(--silver-text) !important;
            text-shadow: 0 0 5px rgba(209, 209, 209, 0.7);
        }

        .gtr-badge {
            margin-bottom: 10px;
            height: 35px;
            display: flex;
            align-items: center;
            transform: scale(0.1);
        }
        .gtr-badge img {filter: drop-shadow(0 5 5px #8a8a8a);}

        .mfd-screen {
            width: 100%; height: 200px; background: var(--mfd-bg); border: 3px solid #000; border-radius: 5px;
            box-shadow: inset 0 0 20px #000, 0 0 10px var(--mfd-glow); padding: 12px;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .mfd-screen::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; pointer-events: none;
        }

        .screen-header {
            display: flex; justify-content: space-between; color: var(--mfd-text); font-family: 'Orbitron', sans-serif;
            border-bottom: 1px solid var(--mfd-text); padding-bottom: 5px; margin-bottom: 10px; font-size: 0.9rem; text-shadow: 0 0 5px var(--mfd-glow);
        }

        .task-list { flex-grow: 1; overflow-y: auto; color: #ddd; scrollbar-width: none; z-index: 2; }
        .task-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .task-item input {
            appearance: none; width: 14px; height: 14px; border: 1px solid var(--mfd-text); background: transparent;
            margin-right: 12px; flex-shrink: 0; border-radius: 2px;
        }
        .task-item input:checked { background: var(--mfd-text); box-shadow: 0 0 5px var(--mfd-text); }
        .task-item input:checked + span { color: #555; text-decoration: line-through; }

        .nav-controls { width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: auto; }
        .btn-col { display: flex; flex-direction: column; align-items: center; }
        .nav-label { font-size: 0.55rem; color: #666; margin-bottom: 5px; letter-spacing: 1px; }
        .btn-group { display: flex; width: 100%; justify-content: space-between; background: #080808; border-radius: 3px; border: 1px solid #1a1a1a; }
        .nav-btn {
            background: var(--btn-base); color: #888; border: none; padding: 8px 0; width: 50%; font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem; cursor: pointer; box-shadow: inset 0 1px 1px rgba(255,255,255,0.05); transition: 0.1s;
        }
        .nav-btn:active { transform: translateY(1px); color: var(--mfd-text); }
        .nav-btn:first-child { border-right: 1px solid #111; }

        /* --- KEY IGNITION --- */
        .ignition-unit {
            position: absolute; right: 30%; bottom: 20%; width: 80px; height: 80px;
            background: #111; border-radius: 50%; border: 4px solid #222;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; transform: translateZ(150px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        .key-slot {
            width: 50px; height: 10px; background: #000; border-radius: 2px;
            transform: rotate(0deg); transition: transform 0.3s ease; cursor: pointer;
            box-shadow: inset 0 0 5px var(--jdm-red);
        }
        .key-active .key-slot { transform: rotate(90deg); box-shadow: 0 0 15px var(--jdm-red); background: var(--jdm-red); }

        /* --- RIGHT: GAUGES --- */
        .gauge-cluster {
            display: flex; gap: 20px;
            transform: rotateY(-20deg) translateY(-20px) translateZ(80px); 
            z-index: 20;
        }
        .gauge {
            width: 180px; height: 180px; background: #050505; border-radius: 50%; border: 6px solid #151515;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 20px #000; position: relative;
        }
        .needle {
            position: absolute; bottom: 50%; left: 50%; width: 3px; height: 42%; background: #fff;
            transform-origin: bottom center; transform: rotate(-130deg); transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1); z-index: 10;
        }
        .needle::after {
            content: ''; position: absolute; bottom: -6px; left: -6px; width: 15px; height: 15px; background: var(--mfd-text); border-radius: 50%;
        }
        .gauge-label { position: absolute; width: 100%; text-align: center; bottom: 35px; color: #777; font-size: 0.6rem; letter-spacing: 2px; }
    </style>
</head>
<body id="master-body">

    <div class="windshield" id="bg-scene"></div>

    <div class="dash-rig" id="pov-rig">
        <div class="dashboard-base"></div>

        <div class="cockpit-wrap">
            
            <div class="telemetry-panel power-element">
                <div class="tel-header">MEXT PROTOCOL // ACTIVE</div>
                
                <div class="objective-box">
                    <div class="obj-title">IMMEDIATE DOCUMENT OBJECTIVE:</div>
                    <div class="obj-target" id="obj-readout">---</div>
                </div>
                
                <div class="track-map">
                    <div class="map-title">DOCUMENT STAGE MAP</div>
                    <div class="route-line"></div>
                    
                    <div class="checkpoint" style="left: 10%;" id="cp-1"></div>
                    <div class="cp-label bottom" style="left: 10%;">MAR<br>PREP</div>
                    
                    <div class="checkpoint" style="left: 30%;" id="cp-2"></div>
                    <div class="cp-label top" style="left: 30%;" id="lb-2">E.APR<br>APP FORM</div>
                    
                    <div class="checkpoint" style="left: 50%;" id="cp-3"></div>
                    <div class="cp-label bottom" style="left: 50%;" id="lb-3">L.APR<br>IITM/DOCS</div>
                    
                    <div class="checkpoint" style="left: 70%;" id="cp-4"></div>
                    <div class="cp-label top" style="left: 70%;" id="lb-4">E.MAY<br>MEDICAL</div>
                    
                    <div class="checkpoint" style="left: 90%;" id="cp-5"></div>
                    <div class="cp-label bottom" style="left: 90%;" id="lb-5">M.MAY<br>SUBMIT</div>

                    <div id="course-position"></div>
                </div>
            </div>

            <div class="center-console">
                <div class="gtr-badge"><img src="pngegg.png" alt="GTR"></div>
                
                <div class="mfd-screen power-element">
                    <div class="screen-header">
                        <span id="disp-month">---</span>
                        <span id="disp-subj">---</span>
                        <span id="disp-week">---</span>
                    </div>
                    <div class="task-list" id="task-container"></div>
                </div>

                <div class="nav-controls power-element">
                    <div class="btn-col">
                        <div class="nav-label">MONTH</div>
                        <div class="btn-group">
                            <button class="nav-btn" onclick="navMonth(-1)">M-</button>
                            <button class="nav-btn" onclick="navMonth(1)">M+</button>
                        </div>
                    </div>
                    <div class="btn-col">
                        <div class="nav-label">WEEK</div>
                        <div class="btn-group">
                            <button class="nav-btn" onclick="navWeek(-1)">W-</button>
                            <button class="nav-btn" onclick="navWeek(1)">W+</button>
                        </div>
                    </div>
                    <div class="btn-col">
                        <div class="nav-label">SUBJECT</div>
                        <div class="btn-group">
                            <button class="nav-btn" onclick="navSubj(-1)">S-</button>
                            <button class="nav-btn" onclick="navSubj(1)">S+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="gauge-cluster power-element">
                <div class="gauge">
                    <div class="needle" id="speed-needle"></div>
                    <div class="gauge-label">SYLLABUS BOOST</div>
                </div>
                <div class="gauge">
                    <div class="needle" id="time-needle"></div>
                    <div class="gauge-label">EXAM COUNTDOWN</div>
                </div>
            </div>

            <div class="ignition-unit" id="ignition-unit" onclick="togglePower()">
                <div class="key-slot"></div>
            </div>

        </div>
    </div>

<script>
    // --- AUDIO ---
    const sfx = {
        door: new Audio('door.mp3'),
        ignition: new Audio('output.wav'),
        rev: new Audio('rev.wav')
    };

    // --- DEADLINES ---
    const mextDeadlines = [
        { date: new Date("March 1, 2026"), title: "MARCH PREPARATION" },
        { date: new Date("April 1, 2026"), title: "APPLICATION FORM (Early April)", cpIdx: 2 },
        { date: new Date("April 15, 2026"), title: "DOCUMENT ATTESTATION / IITM", cpIdx: 3 },
        { date: new Date("May 1, 2026"), title: "MEDICAL CERTIFICATE (Early May)", cpIdx: 4 },
        { date: new Date("May 15, 2026"), title: "FINAL DOCUMENT SUBMISSION", cpIdx: 5 },
        { date: new Date("June 30, 2026"), title: "MEXT EXAM & INTERVIEW" }
    ];

    // --- SYLLABUS ---
    const months = ["MARCH", "APRIL", "MAY", "JUNE"];
    const subjects = ["PHYSICS", "CHEMISTRY", "MATHEMATICS"];
    const syllabus = {
        "MARCH": {
            "PHYSICS": { 1: ["Kinematics", "Newton's Laws"], 2: ["Work", "Energy", "Power"], 3: ["Circular Motion", "Gravitation", "Friction"], 4: ["Hydrostatics", "Fluid Dynamics"] },
            "CHEMISTRY": { 1: ["Stoichiometry", "Periodic Table"], 2: ["Atomic Structure", "Chemical Bonding"], 3: ["Equilibrium", "Kinetics"], 4: ["Thermodynamics", "Gas Law"] },
            "MATHEMATICS": { 1: ["Linear Equations", "Quadratic Equations"], 2: ["Matrices", "Logarithms"], 3: ["Sequences", "Series"], 4: ["Trigonometry", "Inverse Trigonometry"] }
        },
        "APRIL": {
            "PHYSICS": { 1: ["Thermodynamics", "PVT Cycles"], 2: ["Electrostatics", "Electric Circuits"], 3: ["Electrodynamics", "Magnetism", "EM Waves"], 4: ["Reflection", "Refraction", "Lenses"] },
            "CHEMISTRY": { 1: ["Hydrocarbons", "Isomerism"], 2: ["Alcohols", "Phenols", "Ether"], 3: ["Carbonyls", "Carboxylic Acids"], 4: ["Polymers", "Organic Reactions"] },
            "MATHEMATICS": { 1: ["Limits", "Continuity"], 2: ["Differentiation"], 3: ["Integration"], 4: ["Differential Equations"] }
        },
        "MAY": {
            "PHYSICS": { 1: ["Waves", "SHM", "Doppler Effect", "Interference"], 2: ["Nuclear Physics", "Modern Physics", "Semiconductors"], 3: ["Mock Test 1"], 4: ["Mock Test 2"] },
            "CHEMISTRY": { 1: ["Inorganic Blocks"], 2: ["Qualitative Analysis"], 3: ["Mock Test 1"], 4: ["Mock Test 2"] },
            "MATHEMATICS": { 1: ["3d Geometry", "Vectors"], 2: ["Conic Sections"], 3: ["Mock Test 1"], 4: ["Mock Test 2"] }
        },
        "JUNE": { 
            "PHYSICS": { 1: ["Mock Test 3"], 2: ["Formula", "Concepts", "REVISION"] },
            "CHEMISTRY": { 1: ["Mock Test 3"], 2: ["Mechanism Review", "Chemical REview", "REVISION"] },
            "MATHEMATICS": { 1: ["Mock Test 3"], 2: ["Algebra","Trigonometry", "Calculus Targets", "Coord Geometry", "Formula", "REVISION"] }
        }
    };

    let isPowered = false;
    let curMonth = 0, curSubj = 0, curWeek = 1;
    let progressState = {};
    let totalTasks = 0;
    for(let m in syllabus) for(let s in syllabus[m]) for(let w in syllabus[m][s]) totalTasks += syllabus[m][s][w].length;

    // --- IGNITION ---
    function togglePower() {
        if (!isPowered) {
            isPowered = true;
            document.getElementById('master-body').classList.add('power-on');
            document.getElementById('ignition-unit').classList.add('key-active');
            sfx.door.play();
            setTimeout(() => {
                sfx.ignition.play();
                const needles = [document.getElementById('speed-needle'), document.getElementById('time-needle')];
                needles.forEach(n => n.style.transform = 'rotate(130deg)'); 
                setTimeout(() => {
                    loadProgress();
                    updateTimeProgress();
                    renderMFD();
                }, 1000);
            }, 800);
        } else {
            isPowered = false;
            document.getElementById('master-body').classList.remove('power-on');
            document.getElementById('ignition-unit').classList.remove('key-active');
            saveProgress();
            document.querySelectorAll('.needle').forEach(n => n.style.transform = 'rotate(-130deg)');
            document.getElementById('disp-month').innerText = "---"; 
            document.getElementById('disp-subj').innerText = "---"; 
            document.getElementById('disp-week').innerText = "---";
            document.getElementById('task-container').innerHTML = '';
            document.getElementById('obj-readout').innerText = "---";
        }
    }

    // --- LOGIC ---
    function saveProgress() { localStorage.setItem('mext_gtr_save', JSON.stringify(progressState)); }
    function loadProgress() {
        const saved = localStorage.getItem('mext_gtr_save');
        if (saved) { progressState = JSON.parse(saved); updateSpeedometer(); }
    }

    function renderMFD() {
        if (!isPowered) return;
        const mName = months[curMonth], sName = subjects[curSubj];
        const maxW = Object.keys(syllabus[mName][sName]).length;
        if (curWeek > maxW) curWeek = maxW;
        document.getElementById('disp-month').innerText = mName; 
        document.getElementById('disp-subj').innerText = sName; 
        document.getElementById('disp-week').innerText = `W${curWeek}`;
        const container = document.getElementById('task-container');
        container.innerHTML = ''; 
        const tasks = syllabus[mName][sName][curWeek] || [];
        tasks.forEach((task, index) => {
            const key = `${mName}-${sName}-${curWeek}-${index}`;
            const check = progressState[key] ? 'checked' : '';
            container.insertAdjacentHTML('beforeend', `<label class="task-item"><input type="checkbox" data-key="${key}" ${check}><span>${task}</span></label>`);
        });
        document.querySelectorAll('.task-item input').forEach(box => {
            box.addEventListener('change', (e) => {
                progressState[e.target.dataset.key] = e.target.checked;
                if(e.target.checked) { sfx.rev.currentTime = 0; sfx.rev.play(); }
                updateSpeedometer();
            });
        });
    }

    function navMonth(dir) { if(!isPowered) return; curMonth = (curMonth + dir + months.length) % months.length; renderMFD(); }
    function navSubj(dir) { if(!isPowered) return; curSubj = (curSubj + dir + subjects.length) % subjects.length; renderMFD(); }
    function navWeek(dir) { if(!isPowered) return; const maxW = Object.keys(syllabus[months[curMonth]][subjects[curSubj]]).length; curWeek += dir; if(curWeek < 1) curWeek = maxW; if(curWeek > maxW) curWeek = 1; renderMFD(); }

    function updateSpeedometer() {
        if (!isPowered) return;
        const completed = Object.values(progressState).filter(v => v === true).length;
        const p = totalTasks > 0 ? (completed / totalTasks) : 0;
        document.getElementById('speed-needle').style.transform = `rotate(${(p * 260) - 130}deg)`;
    }

    function updateTimeProgress() {
        if (!isPowered) return;
        const now = new Date();
        const start = new Date("March 1, 2026").getTime();
        const end = new Date("July 1, 2026").getTime();
        let p = (now.getTime() - start) / (end - start);
        p = Math.max(0, Math.min(1, p));
        document.getElementById('time-needle').style.transform = `rotate(${(p * 260) - 130}deg)`;
        const trackStart = 10, trackEnd = 90;
        const datePos = trackStart + (p * (trackEnd - trackStart));
        document.getElementById('course-position').style.left = `${datePos}%`;
        const nextGoal = mextDeadlines.find(d => now <= d.date) || mextDeadlines[mextDeadlines.length - 1];
        document.getElementById('obj-readout').innerText = nextGoal.title;
        mextDeadlines.forEach((d, i) => {
            const cp = document.getElementById(`cp-${i+1}`);
            if(cp && now >= d.date) cp.classList.add('cleared');
        });
    }

    // Parallax
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5), y = (e.clientY / window.innerHeight - 0.5);
        document.getElementById('pov-rig').style.transform = `rotateX(${y * 8}deg) rotateY(${x * -12}deg)`;
        document.getElementById('bg-scene').style.transform = `translate(${x * 25}px, ${y * 25}px) scale(1.05)`;
    });

    setInterval(() => { if(isPowered) updateTimeProgress(); }, 60000);
</script>
</body>
</html>
